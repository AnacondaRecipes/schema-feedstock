{% set name = "schema" %}
{% set version = "0.7.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: e86cc08edd6fe6e2522648f4e47e3a31920a76e82cce8937535422e310862ab5

build:
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps . -vv --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python

test:
  imports:
    - schema
  source_files:
    - test_schema.py
    # The license is needed for pytest
    - LICENSE-MIT
  requires:
    - pip
    - pytest
    - mock
  commands:
    - pip check
    - pytest -vv --color=yes test_schema.py

about:
  home: https://github.com/keleshev/schema
  license: MIT
  license_family: MIT
  license_file: LICENSE-MIT
  summary: Schema validation just got Pythonic
  description: |
    schema is a Python library for validating data structures, such as those
    obtained from config-files, forms, external services or command-line
    parsing, converted from JSON/YAML (or something else) to Python data-types.
  dev_url: https://github.com/keleshev/schema
  doc_url: https://github.com/keleshev/schema/blob/master/README.rst

extra:
  recipe-maintainers:
    - shcheklein
    - efiop
    - maxhora
